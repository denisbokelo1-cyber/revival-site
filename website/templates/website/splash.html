{% load static i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% trans "REVIVAL" %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #035194;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── background blobs ── */
    .splash-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: blobIn 1s ease forwards;
    }
    .blob--1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #019cd6 0%, transparent 70%);
      top: -120px; left: -100px;
      animation-delay: .2s;
    }
    .blob--2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #001860 0%, transparent 70%);
      bottom: -100px; right: -80px;
      animation-delay: .4s;
    }
    @keyframes blobIn {
      to { opacity: .55; }
    }

    /* ── grid lines ── */
    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── center wrapper ── */
    .splash {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ── logo ── */
    .splash__logo {
      opacity: 0;
      transform: scale(.6);
      animation: logoIn .7s cubic-bezier(.34,1.56,.64,1) .3s forwards;
    }
    .splash__logo img {
      width: 120px;
      height: auto;
      filter: drop-shadow(0 0 24px rgba(1,156,214,.6));
    }
    @keyframes logoIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* ── pulse ring around logo ── */
    .splash__ring {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid rgba(1,156,214,.4);
      opacity: 0;
      animation: ringPulse 1.6s ease-out 1s infinite;
    }
    .splash__ring--2 {
      width: 200px;
      height: 200px;
      border-color: rgba(1,156,214,.2);
      animation-delay: 1.3s;
    }
    @keyframes ringPulse {
      0%   { opacity: .8; transform: scale(.85); }
      100% { opacity: 0;  transform: scale(1.3); }
    }

    /* ── typewriter text ── */
    .splash__text {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 2px 16px rgba(0,0,0,.4), 0 0 40px rgba(0,255,255,.25);
      min-height: 1.4em;
      text-align: center;
      opacity: 0;
      animation: fadeIn .4s ease 1s forwards;
    }
    .splash__text .cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #00FFFF;
      margin-left: 4px;
      vertical-align: middle;
      border-radius: 2px;
      animation: blink .7s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── progress bar ── */
    .splash__bar {
      width: 220px;
      height: 3px;
      background: rgba(255,255,255,.2);
      border-radius: 3px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn .4s ease 1s forwards;
    }
    .splash__bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffffff, #00FFFF);
      border-radius: 3px;
      transition: width linear;
    }

    /* ── fade out whole splash ── */
    body.fade-out {
      animation: fadeOut .6s ease forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="splash-bg">
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>
    <div class="grid-lines"></div>
  </div>

  <div class="splash">
    <div style="position:relative;display:flex;align-items:center;justify-content:center;">
      <div class="splash__ring"></div>
      <div class="splash__ring splash__ring--2"></div>
      <div class="splash__logo">
        <img src="{% static 'logo/logo.png' %}" alt="{% trans "REVIVAL" %}" />
      </div>
    </div>
    <div class="splash__text"><span id="tw"></span><span class="cursor"></span></div>
    <div class="splash__bar"><div class="splash__bar-fill" id="barFill"></div></div>
  </div>

  <script>
    const words   = ["{% trans "Renaitre" %}", "{% trans "Créer" %}", "{% trans "Impacter" %}"];
    const SPEED   = 80;   // ms per char type
    const ERASE   = 40;   // ms per char erase
    const PAUSE   = 800;  // ms pause at full word before erasing
    const tw      = document.getElementById('tw');
    const barFill = document.getElementById('barFill');

    // Estimate total duration: sum of type + pause + erase for each word
    function estimateTotal() {
      let t = 1100; // initial delay
      words.forEach((w, i) => {
        t += w.length * SPEED;   // typing
        t += PAUSE;               // pause at end
        if (i < words.length - 1) {
          t += w.length * ERASE; // erase (not last word)
          t += 200;               // gap before next word
        }
      });
      t += 800; // extra pause after last word before redirect
      return t;
    }

    const TOTAL = estimateTotal();

    // Progress bar spans the full duration
    setTimeout(() => {
      barFill.style.transition = `width ${TOTAL - 1100}ms linear`;
      barFill.style.width = '100%';
    }, 1100);

    // Typewriter: type each word, erase all but last, then redirect
    let wi = 0, ci = 0, typing = true;

    function tick() {
      const word = words[wi];
      if (typing) {
        tw.textContent = word.slice(0, ++ci);
        if (ci < word.length) {
          setTimeout(tick, SPEED);
        } else {
          // Full word shown — pause then decide
          const isLast = wi === words.length - 1;
          if (isLast) {
            // Last word: keep it visible then redirect
            setTimeout(redirect, 800);
          } else {
            typing = false;
            setTimeout(tick, PAUSE);
          }
        }
      } else {
        // Erasing
        tw.textContent = word.slice(0, --ci);
        if (ci > 0) {
          setTimeout(tick, ERASE);
        } else {
          typing = true;
          wi++;
          setTimeout(tick, 200);
        }
      }
    }

    function redirect() {
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = "{% url 'website:home' %}"; }, 600);
    }

    // Start typewriter after logo appears
    setTimeout(tick, 1100);
  </script>
</body>
</html>
