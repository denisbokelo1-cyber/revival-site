<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6584;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="#6c63ff" opacity="0.08"/>
  <circle cx="150" cy="400" r="90" fill="#ff6584" opacity="0.08"/>
  <circle cx="700" cy="380" r="60" fill="#6c63ff" opacity="0.06"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accent)"/>
  <!-- Badge -->
  <rect x="40" y="40" width="130" height="28" rx="14" fill="#6c63ff" opacity="0.2"/>
  <text x="105" y="59" font-family="Arial, sans-serif" font-size="11" fill="#6c63ff" text-anchor="middle" font-weight="bold">LegalTech · AI</text>
  <!-- Main title -->
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="72" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4">LAWLINKER</text>
  <!-- Gradient underline -->
  <rect x="200" y="215" width="400" height="3" rx="2" fill="url(#accent)"/>
  <!-- Subtitle -->
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="18" fill="#a0a0c0" text-anchor="middle">AI Legal Growth &amp; Matching System</text>
  <!-- Icons row -->
  <text x="220" y="330" font-family="Arial, sans-serif" font-size="13" fill="#6c63ff" text-anchor="middle">⚖️ Avocats</text>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">↔ Matching IA ↔</text>
  <text x="580" y="330" font-family="Arial, sans-serif" font-size="13" fill="#ff6584" text-anchor="middle">👤 Clients</text>
  <!-- Tagline -->
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="14" fill="#888899" text-anchor="middle" font-style="italic">Un marché inefficace transformé en flux intelligent</text>
  <!-- URL -->
  <text x="400" y="460" font-family="Arial, sans-serif" font-size="12" fill="#6c63ff" text-anchor="middle">lawlinker-online.com</text>
  <!-- Bottom bar -->
  <rect x="0" y="496" width="800" height="4" fill="url(#accent)"/>
</svg>