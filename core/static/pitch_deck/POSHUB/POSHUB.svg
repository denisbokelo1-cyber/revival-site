<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#bgGradient)"/>
  
  <!-- Central Circle -->
  <circle cx="200" cy="180" r="100" fill="url(#accentGradient)" opacity="0.2"/>
  
  <!-- Title -->
  <text x="200" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
    POSHUB
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="120" font-size="16" text-anchor="middle" fill="#ffffff" opacity="0.9" font-family="Arial, sans-serif">
    Operating System for Retail
  </text>
  
  <!-- POS Terminal Icon -->
  <g transform="translate(100, 200)">
    <!-- Screen -->
    <rect x="10" y="10" width="80" height="60" rx="4" fill="#00d4ff" stroke="white" stroke-width="2"/>
    <!-- Screen content (grid) -->
    <g stroke="white" stroke-width="1" fill="none">
      <line x1="20" y1="20" x2="80" y2="20"/>
      <line x1="20" y1="30" x2="80" y2="30"/>
      <line x1="20" y1="40" x2="80" y2="40"/>
      <line x1="20" y1="50" x2="80" y2="50"/>
      <line x1="20" y1="60" x2="80" y2="60"/>
    </g>
    <!-- Base -->
    <rect x="20" y="70" width="60" height="20" fill="white" stroke="white" stroke-width="2" rx="2"/>
    <!-- Stand -->
    <line x1="40" y1="90" x2="35" y2="110" stroke="white" stroke-width="3"/>
    <line x1="60" y1="90" x2="65" y2="110" stroke="white" stroke-width="3"/>
  </g>
  
  <!-- Chart Icon -->
  <g transform="translate(220, 200)">
    <!-- Bars -->
    <rect x="10" y="50" width="12" height="50" fill="#00d4ff" stroke="white" stroke-width="1"/>
    <rect x="27" y="35" width="12" height="65" fill="#00d4ff" stroke="white" stroke-width="1"/>
    <rect x="44" y="20" width="12" height="80" fill="#00d4ff" stroke="white" stroke-width="1"/>
    <rect x="61" y="40" width="12" height="60" fill="#00d4ff" stroke="white" stroke-width="1"/>
    <!-- Baseline -->
    <line x1="5" y1="105" x2="80" y2="105" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Features text -->
  <g transform="translate(200, 350)">
    <text x="0" y="-20" font-size="13" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold">
      SALES • STOCK • FINANCE
    </text>
    <text x="0" y="20" font-size="11" text-anchor="middle" fill="#ffffff" opacity="0.8" font-family="Arial, sans-serif">
      Unified Business Intelligence
    </text>
  </g>
  
  <!-- Bottom accent bars -->
  <rect x="0" y="450" width="400" height="50" fill="white" opacity="0.1"/>
  <line x1="50" y1="450" x2="50" y2="500" stroke="#00d4ff" stroke-width="2"/>
  <line x1="150" y1="450" x2="150" y2="500" stroke="#00d4ff" stroke-width="2"/>
  <line x1="250" y1="450" x2="250" y2="500" stroke="#00d4ff" stroke-width="2"/>
  <line x1="350" y1="450" x2="350" y2="500" stroke="#00d4ff" stroke-width="2"/>
</svg>
