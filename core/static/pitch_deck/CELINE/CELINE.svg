<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  <!-- Glow -->
  <ellipse cx="400" cy="250" rx="300" ry="200" fill="url(#glow)"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="80" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="700" cy="120" r="2" fill="#38bdf8" opacity="0.5"/>
  <circle cx="650" cy="420" r="4" fill="#a78bfa" opacity="0.3"/>
  <circle cx="120" cy="380" r="3" fill="#38bdf8" opacity="0.4"/>
  <circle cx="750" cy="300" r="2" fill="#a78bfa" opacity="0.6"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accent2)"/>
  <!-- Badge -->
  <rect x="40" y="40" width="150" height="28" rx="14" fill="#a78bfa" opacity="0.15"/>
  <text x="115" y="59" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="bold">Personal AI · OS</text>
  <!-- AI icon circle -->
  <circle cx="400" cy="130" r="40" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">🤖</text>
  <!-- Main title -->
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="64" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="3">CELINE AI</text>
  <!-- Gradient underline -->
  <rect x="220" y="245" width="360" height="3" rx="2" fill="url(#accent2)"/>
  <!-- Subtitle -->
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="17" fill="#9090b0" text-anchor="middle">Personal AI Operating System</text>
  <!-- Features row -->
  <text x="180" y="345" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">🗓 Organisation</text>
  <text x="400" y="345" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">💬 Assistant IA</text>
  <text x="620" y="345" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">⚡ Productivité</text>
  <!-- Tagline -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="14" fill="#7070a0" text-anchor="middle" font-style="italic">Une seule intelligence, un seul système</text>
  <!-- URL -->
  <text x="400" y="460" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">celineai-app.com</text>
  <!-- Bottom bar -->
  <rect x="0" y="496" width="800" height="4" fill="url(#accent2)"/>
</svg>